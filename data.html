<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Datos</title>
  <style>
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #333; padding: 5px; }
  </style>
</head>
<body>

<h2>Registros</h2>

<table>
  <thead>
    <tr>
      <th>FECHA</th>
      <th>NOMBRE</th>
      <th>APELLIDOS</th>
      <th>TIPO DOC</th>
      <th>NR DOC</th>
      <th>FECHA NACIMIENTO</th>
      <th>NACIONALIDAD</th>
      <th>PAÍS RESIDENCIA</th>
      <th>PROVINCIA</th>
      <th>COD. POSTAL</th>
      <th>MUNICIPIO</th>
      <th>DIRECCIÓN</th>
      <th>TELÉFONO</th>
      <th>EMAIL</th>
      <th>PARENTESCO</th>
      <th>AUT. COMERCIAL</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  "https://beskvtpqslbdgxpaykpr.supabase.co",
  "sb_publishable_XRusyph2RQyJj9t8Y0gl6w_nsf5w_dK"
);

async function cargarDatos() {
  const { data, error } = await supabase
    .from("REGISTRE")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  data.forEach(reg => {
    const fila = document.createElement("tr");

    fila.innerHTML = `
      <td>${reg.fecha}</td>
      <td>${reg.nombre}</td>
      <td>${reg.apellidos}</td>
      <td>${reg.tipoDoc}</td>
      <td>${reg.numeroDoc}</td>
      <td>${reg.fechaNacimiento}</td>
      <td>${reg.nacionalidad}</td>
      <td>${reg.paisResidencia}</td>
      <td>${reg.provincia}</td>
      <td>${reg.codigoPostal}</td>
      <td>${reg.municipio}</td>
      <td>${reg.direccion}</td>
      <td>${reg.telefono}</td>
      <td>${reg.email}</td>
      <td>${reg.parentesco}</td>
      <td>${reg.comComerciales}</td>
    `;

    tabla.appendChild(fila);
  });
}

cargarDatos();
</script>

</body>
</html>
