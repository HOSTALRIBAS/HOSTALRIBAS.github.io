<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Datos</title>

<style>
body {
  margin-left: 0.5cm;
  margin-right: 0.5cm;
  font-family: Arial, sans-serif;
}

table {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed; /* clave para ajustar */
}

th, td {
  border: 0.5px solid #999; /* líneas finas grises */
  padding: 4px;
  font-size: 0.8em; /* un poco más pequeño */
  text-align: left;

  /* CLAVE: permitir ajuste */
  word-break: break-word;
  overflow-wrap: break-word;
}

/* Cabecera de la tabla */
th {
  background-color: #C9C9C9; /* gris muy claro */
  text-align: center;         /* centra el texto */
}

td:last-child {
  text-align: center; /* centra el PDF icono */
}
</style>

</head>
<body>

<table>
  <thead>
    <tr>
      <th>DATA</th>
      <th>NOM</th>
      <th>COGNOMS</th>
      <th>TIPUS DOC</th>
      <th>NR DOC</th>
      <th>NAIXEMENT</th>
      <th>NACIONALITAT</th>
      <th>RESIDÈNCIA</th>
      <th>PROVÍNCIA</th>
      <th>CODI POSTAL</th>
      <th>LOCALITAT</th>
      <th>ADREÇA</th>
      <th>TELÈFON</th>
      <th>EMAIL</th>
      <th>PARENTIU</th>
      <th>AUT. COM.</th>
      <th>PDF</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseData = window.supabase.createClient(
  "https://beskvtpqslbdgxpaykpr.supabase.co",
  "sb_publishable_XRusyph2RQyJj9t8Y0gl6w_nsf5w_dK"
);

async function cargarDatos() {
  const { data, error } = await supabaseData
    .from("REGISTRE")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

data.forEach(reg => {
  // FECHA: formatear a DD-MM-AA HH:MM
  const fecha = new Date(reg.fecha);
  const dia = String(fecha.getDate()).padStart(2,'0');
  const mes = String(fecha.getMonth()+1).padStart(2,'0');
  const anio = String(fecha.getFullYear()).slice(-2);
  const horas = String(fecha.getHours()).padStart(2,'0');
  const minutos = String(fecha.getMinutes()).padStart(2,'0');
  const fechaFormateada = `${dia}-${mes}-${anio} ${horas}:${minutos}`;

  // NACIMIENTO: DD-MM-AA
  const nacimiento = reg.fechaNacimiento; // 'DD-MM-YYYY'
  const nacimientoFormateado = nacimiento.split('-').map((v,i) => i===2 ? v.slice(-2) : v).join('-');

  const fila = document.createElement("tr");
  fila.innerHTML = `
    <td>${fechaFormateada}</td>
    <td>${reg.nombre}</td>
    <td>${reg.apellidos}</td>
    <td>${reg.tipoDoc}</td>
    <td>${reg.numeroDoc}</td>
    <td>${nacimientoFormateado}</td>
    <td>${reg.nacionalidad}</td>
    <td>${reg.paisResidencia}</td>
    <td>${reg.provincia}</td>
    <td>${reg.codigoPostal}</td>
    <td>${reg.municipio}</td>
    <td>${reg.direccion}</td>
    <td>${reg.telefono}</td>
    <td>${reg.email}</td>
    <td>${reg.parentesco}</td>
    <td>${reg.comComerciales}</td>
    <td>
      <img src="pdf-icon.png" 
           style="width:20px; cursor:pointer;"
           onclick='generarPDF(${JSON.stringify(reg)})'>
    </td>
  `;
  tabla.appendChild(fila);
});
}

cargarDatos();
</script>

<script>
const { jsPDF } = window.jspdf;

function generarPDF(reg) {
  const doc = new jsPDF({
    orientation: "landscape",
    unit: "cm",
    format: [29.5, 20.5] // página horizontal completa
  });

  doc.setFont("helvetica", "normal");

  // Dimensiones del borde
  const borderWidth = 0.02; // línea muy fina
  const borderW = 13.75;    
  const borderH = 23 - 3;   
  const startX = ((29.5 - borderW) / 2 - 8 + 1) - 0.4; 
  const startY = 0.5 - 0.3; 

  const paddingX = 0.5; 

  // Preparar contenido
  const fecha = new Date(reg.fecha);
  const fechaFormateada = `${String(fecha.getDate()).padStart(2,'0')}-${String(fecha.getMonth()+1).padStart(2,'0')}-${String(fecha.getFullYear()).slice(-2)}`;
  const nacimientoPDF = reg.fechaNacimiento.split('-').map((v,i)=>i===2?v.slice(-2):v).join('-');

  const lines = [
    "HOSTAL RIBAS",
    "REGISTRE DE VIATGERS D'ESTABLIMENTS D'HOSTALATGE.",
    `DATA: ${fechaFormateada}`,
    `NOM: ${reg.nombre}`,
    `COGNOMS: ${reg.apellidos}`,
    `TIPUS DOCUMENT: ${reg.tipoDoc}`,
    `NÚM. DOCUMENT: ${reg.numeroDoc}`,
    `DATA NAIXEMENT: ${nacimientoPDF}`,
    `NACIONALITAT: ${reg.nacionalidad}`,
    `PAÍS RESIDÈNCIA: ${reg.paisResidencia}`,
    `PROVÍNCIA: ${reg.provincia}`,
    `CODI POSTAL: ${reg.codigoPostal}`,
    `LOCALITAT: ${reg.municipio}`,
    `ADREÇA: ${reg.direccion}`,
    `TELÈFON: ${reg.telefono}`,
    `EMAIL: ${reg.email}`,
    `PARENTIU: ${reg.parentesco}`,
    `AUT. COMERCIAL: ${reg.comComerciales}`
  ];

  const lineHeight = 0.7;
  const contentHeight = lines.length * lineHeight;

  // Mantener contenido en la misma posición
  let y = startY + (borderH - contentHeight) / 2 + lineHeight - 0.2 - 3;

  // Escribir contenido línea por línea
  lines.forEach((line, index) => {
    if(index === 0) doc.setFontSize(12);       // HOSTAL RIBAS
    else doc.setFontSize(10);
    doc.text(line, startX + paddingX, y);
    y += lineHeight;

    // Después de la línea del registro, añadir 1 cm de espacio
    if(index === 1) y += 0.5; 
  });

  // Agregar FIRMA debajo de "Aut. Comercial"
  const firmaSpacing = 2;    
  const nombreSpacing = 3;   
  y += firmaSpacing;
  doc.setFontSize(10);
  doc.text("SIGNATURA", startX + paddingX, y);

  y += nombreSpacing;
  doc.text(`${reg.nombre} ${reg.apellidos}`, startX + paddingX, y);

  // Dibujar borde gris muy fino
  doc.setDrawColor(150);
  doc.setLineWidth(borderWidth);
  doc.rect(startX, startY, borderW, borderH);

  doc.save(`${reg.nombre}_${reg.apellidos}.pdf`);
}

</script>

</body>
</html>
