<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Datos</title>

<style>

body {
  margin-left: 0.5cm;
  margin-right: 0.5cm;
  font-family: Arial, sans-serif;
}

/* Contenedor scrollable */
.table-container {
  max-height: 300px; /* ajusta según tu pantalla */
  overflow-y: auto;
  border: 1px solid #ccc;
}

/* Tabla */
table {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed;
}

th, td {
  border: 0.5px solid #999;
  padding: 4px;
  font-size: 0.8em;
  text-align: left;
  word-break: break-word;
  overflow-wrap: break-word;
}

/* Cabecera sticky */
thead th {
  background-color: #C9C9C9;
  position: sticky;
  top: 0;
  z-index: 2;
  text-align: center;
}

td:last-child {
  text-align: center;
}

.nueva-fila {
  font-weight: bold;
  transform: translateY(-5px);
}

.parentiu {
  font-weight: bold;
}

.menor {
  font-weight: bold;
  color: black;
}

.flecha {
  color: red;
  font-weight: normal;
}

.centrado {
  text-align: center;
}

</style>

</head>
<body>

<div class="table-container">
<table>
  <thead>
    <tr>
      <th style="width:6%;">DATA</th>
      <th style="width:8%;">NOM</th>
      <th style="width:8%;">COGNOMS</th>
      <th style="width:5%;">TIPUS DOC</th>
      <th style="width:7%;">NR DOC</th>
      <th style="width:6%;">NAIXEMENT</th>
      <th style="width:5%;">NACIONALITAT</th>
      <th style="width:5%;">RESIDÈNCIA</th>
      <th style="width:11%;">ADREÇA</th>
      <th style="width:3%;">CP</th>
      <th style="width:7%;">LOCALITAT</th>
      <th style="width:5%;">PROVÍNCIA</th>
      <th style="width:6%;">TELÈFON</th>
      <th style="width:11%;">EMAIL</th>
      <th style="width:4%;">AD/ME</th>
      <th style="width:6%;">PARENTIU</th>
      <th style="width:3%;">AUT. COM.</th>
      <th style="width:3%;">PDF</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseData = window.supabase.createClient(
  "https://beskvtpqslbdgxpaykpr.supabase.co",
  "sb_publishable_XRusyph2RQyJj9t8Y0gl6w_nsf5w_dK"
);

async function cargarDatos() {
  const { data, error } = await supabaseData
    .from("REGISTRE")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

data.forEach((reg, index) => {
  // FECHA: formatear a DD-MM-AA HH:MM
  const fecha = new Date(reg.fecha);
  const dia = String(fecha.getDate()).padStart(2,'0');
  const mes = String(fecha.getMonth()+1).padStart(2,'0');
  const anio = String(fecha.getFullYear()).slice(-2);
  const horas = String(fecha.getHours()).padStart(2,'0');
  const minutos = String(fecha.getMinutes()).padStart(2,'0');
  const fechaFormateada = `${dia}/${mes}/${anio} ${horas}:${minutos}`;



let nacimientoFormateado = "";
let estadoEdad = "";

if (reg.fechaNacimiento) {
  const [anioN, mesN, diaN] = reg.fechaNacimiento.split('-');

  // Formatear fecha
  nacimientoFormateado = `${diaN}/${mesN}/${anioN.slice(-2)}`;

  // Calcular edad
  const nacimientoDate = new Date(`${anioN}-${mesN}-${diaN}`);
  const hoy = new Date();

  let edad = hoy.getFullYear() - nacimientoDate.getFullYear();

  if (
    hoy.getMonth() < nacimientoDate.getMonth() ||
    (hoy.getMonth() === nacimientoDate.getMonth() && hoy.getDate() < nacimientoDate.getDate())
  ) {
    edad--;
  }

  estadoEdad = edad >= 18 ? "AD" : "ME";
}



  const fila = document.createElement("tr");

if (index === data.length - 1) {
  fila.classList.add("nueva-fila");

  setTimeout(() => {
    fila.classList.remove("nueva-fila");
  }, 20000);
}

  fila.innerHTML = `
    <td>${fechaFormateada}</td>
    <td>${reg.nombre}</td>
    <td>${reg.apellidos}</td>
    <td>${reg.tipoDoc}</td>
    <td>${reg.numeroDoc}</td>
    <td>${nacimientoFormateado}</td>
    <td>${reg.nacionalidad}</td>
    <td>${reg.paisResidencia}</td>
    <td>${reg.direccion}</td>
    <td>${reg.codigoPostal}</td>
    <td>${reg.municipio}</td>
    <td>${reg.provincia}</td>
    <td>${reg.telefono}</td>
    <td>${reg.email}</td>
    <td class="centrado">
  ${estadoEdad === 'ME' 
    ? '<span class="menor">ME&nbsp;&nbsp;&nbsp;</span><span class="flecha">>></span>' 
    : 'AD'}
</td>
    <td class="parentiu">${reg.parentesco}</td>
    <td style="text-align:center;">${reg.comComerciales}</td>
    <td>
      <img src="pdf-icon.png" 
           style="width:26px; cursor:pointer;"
           onclick='generarPDF(${JSON.stringify(reg)})'>
    </td>
  `;
  tabla.appendChild(fila);
});


requestAnimationFrame(() => {
  const contenedor = document.querySelector('.table-container');
  // Resalta la última fila (si quieres mantener tu efecto)
  const ultimaFila = document.getElementById('tabla').lastElementChild;
  if (ultimaFila) {
    ultimaFila.classList.add("nueva-fila");
    setTimeout(() => {
      ultimaFila.classList.remove("nueva-fila");
    }, 12000);
  }

  // Scroll al final para mostrar la última fila
  contenedor.scrollTop = contenedor.scrollHeight;
});


}

cargarDatos();
</script>

<script>
const { jsPDF } = window.jspdf;

function generarPDF(reg) {
  const doc = new jsPDF({
    orientation: "landscape",
    unit: "cm",
    format: [29.5, 20.5]
  });

  const borderWidth = 0.02;
  const borderW = 13.75;
  const borderH = 23 - 3;
  const startX = ((29.5 - borderW) / 2 - 8 + 1) - 0.4;
  const startY = 0.5 - 0.3;
  const paddingX = 0.5;
  const lineHeight = 0.7;

  const centerX = startX + borderW / 2;

  // Fecha del registro
  const fecha = new Date(reg.fecha);
  const fechaFormateada = `${String(fecha.getDate()).padStart(2,'0')}/${String(fecha.getMonth()+1).padStart(2,'0')}/${String(fecha.getFullYear()).slice(-2)}`;

  // Manejo seguro de fechaNacimiento
  let nacimientoPDF = "";
  let estadoEdad = "AD";
  if (reg.fechaNacimiento) {
    const [anioN, mesN, diaN] = reg.fechaNacimiento.split('-');
    nacimientoPDF = `${diaN}/${mesN}/${anioN.slice(-2)}`;

    const nacimientoDate = new Date(anioN, mesN - 1, diaN);
    let edad = fecha.getFullYear() - nacimientoDate.getFullYear();
    if (fecha.getMonth() < nacimientoDate.getMonth() ||
        (fecha.getMonth() === nacimientoDate.getMonth() && fecha.getDate() < nacimientoDate.getDate())) {
      edad--;
    }
    if (edad < 18) estadoEdad = "ME";
  }

  // Campos
  const fields = [
    ["DATA:", fechaFormateada],
    ["NOM:", reg.nombre],
    ["COGNOMS:", reg.apellidos],
    ["TIPUS DOCUMENT:", reg.tipoDoc],
    ["NÚM. DOCUMENT:", reg.numeroDoc],
    ["DATA NAIXEMENT:", nacimientoPDF],
    ["NACIONALITAT:", reg.nacionalidad],
    ["PAÍS RESIDÈNCIA:", reg.paisResidencia],
    ["ADREÇA:", reg.direccion],
    ["CODI POSTAL:", reg.codigoPostal],
    ["LOCALITAT:", reg.municipio],
    ["PROVÍNCIA:", reg.provincia],
    ["TELÈFON:", reg.telefono],
    ["EMAIL:", reg.email],
    ["AD/ME:", estadoEdad],
    ["PARENTIU:", reg.parentesco],
    ["AUT. COMERCIAL:", reg.comComerciales]
  ];

  let y = startY + 1.2; // espacio arriba para encabezado

  // --- ENCABEZADO ---
  doc.setFont("helvetica", "normal");
  doc.setFontSize(12);
  doc.text("HOSTAL RIBAS", centerX, y, { align: "center" });

  y += lineHeight;

  doc.setFontSize(10);
  doc.text("REGISTRE DE VIATGERS D'ESTABLIMENTS D'HOSTALATGE.", centerX, y, { align: "center" });

  
  y += 0.3;
  const lineWidthHeader = 10.2;
  doc.setDrawColor(150);
  doc.setLineWidth(0.004);
  doc.line(centerX - lineWidthHeader/2, y, centerX + lineWidthHeader/2, y);

  y += lineHeight + 0.3;

  // --- CAMPOS ---
  fields.forEach(([title, value]) => {
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(0);
    doc.text(title, startX + paddingX, y);

    doc.setFont("times", "normal");
    doc.setFontSize(10);
    doc.setTextColor(50);
    doc.text((value || "").toString(), startX + paddingX + 3.5, y);

    y += lineHeight;
  });

  // --- FIRMA ---
  const firmaSpacing = 1.2;
  const nombreSpacing = 3;
  y += firmaSpacing;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.setTextColor(0);
  doc.text("SIGNATURA", startX + paddingX, y);

  y += nombreSpacing;

  doc.setFont("times", "normal");
  doc.setFontSize(10);
  doc.setTextColor(50);
  doc.text(`${reg.nombre} ${reg.apellidos}`, startX + paddingX, y);

  // Texto derecho
  const textoInferior = `LLORET DE MAR, A ${fechaFormateada}`;
  const margenDerecho = 0.5;
  const xDerecha = startX + borderW - margenDerecho;
  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.setTextColor(0);
  doc.text(textoInferior, xDerecha, y, { align: "right" });

  // --- BORDE ---
  doc.setDrawColor(150);
  doc.setLineWidth(borderWidth);
  doc.rect(startX, startY, borderW, borderH);

  // Guardar PDF
  doc.save(`${reg.nombre}_${reg.apellidos}`.replace(/\s+/g,'_') + ".pdf");
}

</script>

</body>
</html>
