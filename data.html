<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Datos Registrados</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: 20px auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #333; padding: 6px; text-align: left; }
    th { background-color: #eee; }
  </style>
</head>
<body>
  <h1>Registros de Viajeros</h1>
  <table id="tablaRegistros">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Tipo Doc</th>
        <th>Número Doc</th>
        <th>Fecha Nac.</th>
        <th>Nacionalidad</th>
        <th>País Residencia</th>
        <th>Provincia</th>
        <th>Cód. Postal</th>
        <th>Municipio</th>
        <th>Dirección</th>
        <th>Teléfono</th>
        <th>Email</th>
        <th>Parentesco</th>
        <th>Com. Comerciales</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js';

    // 1️⃣ Configurar Supabase
    const SUPABASE_URL = "https://beskvtpqslbdgxpaykpr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_XRusyph2RQyJj9t8Y0gl6w_nsf5w_dK";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2️⃣ Formatear fechas
    function formatearFecha(fecha) {
      if (!fecha) return "";
      const d = new Date(fecha);
      if (isNaN(d)) return "";
      const dia = String(d.getDate()).padStart(2, '0');
      const mes = String(d.getMonth() + 1).padStart(2, '0');
      const ano = String(d.getFullYear()).slice(-2);
      return `${dia}/${mes}/${ano}`;
    }

    // 3️⃣ Cargar registros de Supabase
    async function cargarRegistros() {
      const { data, error } = await supabase
        .from('REGISTRE')
        .select('*')
        .order('fecha', { ascending: false });

      if (error) {
        console.error("Error al obtener registros:", error);
        alert("No se pudieron cargar los registros. Revisa la consola.");
        return;
      }

      const tbody = document.querySelector('#tablaRegistros tbody');
      tbody.innerHTML = '';

      data.forEach(registro => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${registro.fecha ? formatearFecha(registro.fecha) : ''}</td>
          <td>${registro.nombre || ''}</td>
          <td>${registro.apellidos || ''}</td>
          <td>${registro.tipoDoc || ''}</td>
          <td>${registro.numeroDoc || ''}</td>
          <td>${registro.fechaNacimiento ? formatearFecha(registro.fechaNacimiento) : ''}</td>
          <td>${registro.nacionalidad || ''}</td>
          <td>${registro.paisResidencia || ''}</td>
          <td>${registro.provincia || ''}</td>
          <td>${registro.codigoPostal || ''}</td>
          <td>${registro.municipio || ''}</td>
          <td>${registro.direccion || ''}</td>
          <td>${registro.telefono || ''}</td>
          <td>${registro.email || ''}</td>
          <td>${registro.parentesco || ''}</td>
          <td>${registro.comComerciales || ''}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // 4️⃣ Ejecutar carga al abrir la página
    cargarRegistros();
  </script>
</body>
</html>
