<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Datos</title>

<style>
body {
  margin-left: 0.5cm;
  margin-right: 0.5cm;
  font-family: Arial, sans-serif;
}

/* Contenedor scrollable */
.table-container {
  max-height: 300px; /* ajusta según tu pantalla */
  overflow-y: auto;
  border: 1px solid #ccc;
}

/* Tabla */
table {
  border-collapse: collapse;
  width: 100%;
  table-layout: fixed;
}

th, td {
  border: 0.5px solid #999;
  padding: 4px;
  font-size: 0.8em;
  text-align: left;
  word-break: break-word;
  overflow-wrap: break-word;
}

/* Cabecera sticky */
thead th {
  background-color: #C9C9C9;
  position: sticky;
  top: 0;
  z-index: 2;
  text-align: center;
}

td:last-child {
  text-align: center;
}

.nueva-fila {
  font-weight: bold;
  transform: translateY(-5px);
}

.menor {
  font-weight: bold;
}

</style>

</head>
<body>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>DATA</th>
        <th>NOM</th>
        <th>COGNOMS</th>
        <th>TIPUS DOC</th>
        <th>NR DOC</th>
        <th>NAIXEMENT</th>
        <th>NACIONALITAT</th>
        <th>RESIDÈNCIA</th>
        <th>PROVÍNCIA</th>
        <th>CODI POSTAL</th>
        <th>LOCALITAT</th>
        <th>ADREÇA</th>
        <th>TELÈFON</th>
        <th>EMAIL</th>
        <th>AD/ME</th>
        <th>PARENTIU</th>
        <th>AUT. COM.</th>
        <th>PDF</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseData = window.supabase.createClient(
  "https://beskvtpqslbdgxpaykpr.supabase.co",
  "sb_publishable_XRusyph2RQyJj9t8Y0gl6w_nsf5w_dK"
);

async function cargarDatos() {
  const { data, error } = await supabaseData
    .from("REGISTRE")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

data.forEach((reg, index) => {
  // FECHA: formatear a DD-MM-AA HH:MM
  const fecha = new Date(reg.fecha);
  const dia = String(fecha.getDate()).padStart(2,'0');
  const mes = String(fecha.getMonth()+1).padStart(2,'0');
  const anio = String(fecha.getFullYear()).slice(-2);
  const horas = String(fecha.getHours()).padStart(2,'0');
  const minutos = String(fecha.getMinutes()).padStart(2,'0');
  const fechaFormateada = `${dia}/${mes}/${anio} ${horas}:${minutos}`;



let nacimientoFormateado = "";
let estadoEdad = "";

if (reg.fechaNacimiento) {
  const [anioN, mesN, diaN] = reg.fechaNacimiento.split('-');

  // Formatear fecha
  nacimientoFormateado = `${diaN}/${mesN}/${anioN.slice(-2)}`;

  // Calcular edad
  const nacimientoDate = new Date(`${anioN}-${mesN}-${diaN}`);
  const hoy = new Date();

  let edad = hoy.getFullYear() - nacimientoDate.getFullYear();

  if (
    hoy.getMonth() < nacimientoDate.getMonth() ||
    (hoy.getMonth() === nacimientoDate.getMonth() && hoy.getDate() < nacimientoDate.getDate())
  ) {
    edad--;
  }

  estadoEdad = edad >= 18 ? "AD" : "ME";
}



  const fila = document.createElement("tr");

if (index === data.length - 1) {
  fila.classList.add("nueva-fila");

  setTimeout(() => {
    fila.classList.remove("nueva-fila");
  }, 12000);
}

  fila.innerHTML = `
    <td>${fechaFormateada}</td>
    <td>${reg.nombre}</td>
    <td>${reg.apellidos}</td>
    <td>${reg.tipoDoc}</td>
    <td>${reg.numeroDoc}</td>
    <td>${nacimientoFormateado}</td>
    <td>${reg.nacionalidad}</td>
    <td>${reg.paisResidencia}</td>
    <td>${reg.provincia}</td>
    <td>${reg.codigoPostal}</td>
    <td>${reg.municipio}</td>
    <td>${reg.direccion}</td>
    <td>${reg.telefono}</td>
    <td>${reg.email}</td>
    <td class="${estadoEdad === 'ME' ? 'menor' : ''}" style="text-align:center;">${estadoEdad}</td>
    <td>${reg.parentesco}</td>
    <td>${reg.comComerciales}</td>
    <td>
      <img src="pdf-icon.png" 
           style="width:26px; cursor:pointer;"
           onclick='generarPDF(${JSON.stringify(reg)})'>
    </td>
  `;
  tabla.appendChild(fila);
});


requestAnimationFrame(() => {
  const contenedor = document.querySelector('.table-container');
  // Resalta la última fila (si quieres mantener tu efecto)
  const ultimaFila = document.getElementById('tabla').lastElementChild;
  if (ultimaFila) {
    ultimaFila.classList.add("nueva-fila");
    setTimeout(() => {
      ultimaFila.classList.remove("nueva-fila");
    }, 12000);
  }

  // Scroll al final para mostrar la última fila
  contenedor.scrollTop = contenedor.scrollHeight;
});


}

cargarDatos();
</script>

<script>
const { jsPDF } = window.jspdf;

function generarPDF(reg) {
  const doc = new jsPDF({
    orientation: "landscape",
    unit: "cm",
    format: [29.5, 20.5]
  });

  const borderWidth = 0.02;
  const borderW = 13.75;
  const borderH = 23 - 3;
  const startX = ((29.5 - borderW) / 2 - 8 + 1) - 0.4;
  const startY = 0.5 - 0.3;
  const paddingX = 0.5;

  const fecha = new Date(reg.fecha);
  const fechaFormateada = `${String(fecha.getDate()).padStart(2,'0')}/${String(fecha.getMonth()+1).padStart(2,'0')}/${String(fecha.getFullYear()).slice(-2)}`;
  const [anioN, mesN, diaN] = reg.fechaNacimiento.split('-');
  const nacimientoPDF = `${diaN}/${mesN}/${anioN.slice(-2)}`;

  // Contenido del PDF: pares [título, valor]
  const fields = [
    ["DATA:", fechaFormateada],
    ["NOM:", reg.nombre],
    ["COGNOMS:", reg.apellidos],
    ["TIPUS DOCUMENT:", reg.tipoDoc],
    ["NÚM. DOCUMENT:", reg.numeroDoc],
    ["DATA NAIXEMENT:", nacimientoPDF],
    ["NACIONALITAT:", reg.nacionalidad],
    ["PAÍS RESIDÈNCIA:", reg.paisResidencia],
    ["PROVÍNCIA:", reg.provincia],
    ["CODI POSTAL:", reg.codigoPostal],
    ["LOCALITAT:", reg.municipio],
    ["ADREÇA:", reg.direccion],
    ["TELÈFON:", reg.telefono],
    ["EMAIL:", reg.email],
    ["PARENTIU:", reg.parentesco],
    ["AUT. COMERCIAL:", reg.comComerciales]
  ];

  const lineHeight = 0.7;
  let y = startY + 1.2; // espacio adicional arriba para que "HOSTAL RIBAS" baje

  // Título principal en Helvetica normal
  doc.setFont("helvetica", "normal");
  doc.setFontSize(12);
  doc.setTextColor(0); // negro
  doc.text("HOSTAL RIBAS", startX + paddingX, y);
  y += lineHeight;

  doc.setFontSize(10);
  doc.text("REGISTRE DE VIATGERS D'ESTABLIMENTS D'HOSTALATGE.", startX + paddingX, y);
  y += lineHeight + 0.5;

  // Títulos de campos en Helvetica, valores en Times/Courier gris oscuro
  fields.forEach(([title, value]) => {
    // Título en Helvetica normal
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(0); // negro
    doc.text(title, startX + paddingX, y);

    // Valor en Times o Courier, gris oscuro
    doc.setFont("times", "normal"); // o "courier"
    doc.setFontSize(10);
    doc.setTextColor(50); // gris oscuro
    doc.text(value.toString(), startX + paddingX + 3.5, y); // más hacia la izquierda

    y += lineHeight;
  });

  // FIRMA
  const firmaSpacing = 2;
  const nombreSpacing = 3;
  y += firmaSpacing;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.setTextColor(0); // negro
  doc.text("SIGNATURA", startX + paddingX, y);

  y += nombreSpacing;

  doc.setFont("times", "normal"); // o "courier"
  doc.setFontSize(10);
  doc.setTextColor(50); // gris oscuro
  doc.text(`${reg.nombre} ${reg.apellidos}`, startX + paddingX, y);

  // Borde gris muy fino
  doc.setDrawColor(150);
  doc.setLineWidth(borderWidth);
  doc.rect(startX, startY, borderW, borderH);

  doc.save(`${reg.nombre}_${reg.apellidos}`.replace(/\s+/g,'_') + ".pdf");
}

</script>

</body>
</html>
