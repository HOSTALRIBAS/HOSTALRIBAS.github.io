<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Viajeros</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 20px auto;
      line-height: 1.5;
      text-align: center;
      font-size: 1.125em;
    }
    h1 {
      margin: 5px 0;
      white-space: nowrap;
      font-weight: bold;
      font-size: 2em;
    }
    h2 {
      margin: 5px 0;
      white-space: nowrap;
      font-size: 1.25em;
    }
    form {
      text-align: left;
      margin-top: 10px;
      font-size: 1em;
    }
    label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    select {
      flex: 1;
      margin-left: 10px;
      padding: 3px 6px;
      font-size: 1em;
    }
    .documentos {
      margin: 6px 0 12px 0;
    }
    .documento-opcion {
      display: flex;
      align-items: center;
      margin-bottom: 3px;
    }
    .documento-opcion input {
      margin-right: 6px;
    }
    .menores {
      font-weight: bold;
      font-size: 1em;
      margin-top: 6px;
      margin-bottom: 4px;
    }
    .autorizacion {
      font-size: 0.625em;
      margin-top: 6px;
      display: flex;
      align-items: flex-start;
    }
    .autorizacion input {
      margin-right: 6px;
      margin-top: 2px;
    }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      font-size: 1.125em;
    }
    .documento-opcion input[type="radio"] {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #333;
      border-radius: 0;
      margin-right: 6px;
      position: relative;
      cursor: pointer;
    }
    .documento-opcion input[type="radio"]:checked::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      background-color: #333;
    }
  </style>
</head>
<body>
  <h1>HOSTAL RIBAS</h1>
  <h2>Registro de Viajeros de Establecimientos de Hostelaje</h2>

  <form id="myForm">
    <!-- Aquí va todo tu formulario tal como lo tienes -->
    <!-- ... -->
  </form>

  <!-- Usamos type="module" para poder usar import en script.js -->
  <script type="module" src="script.js"></script>
</body>
</html>
